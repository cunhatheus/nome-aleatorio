<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inicial-scale=1.0">
    <title>Nome Aleatório</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mainContainer">
        <div id="nameBox"> </div>
        <button id="nameButton"> <span>🎲</span><span id="nameButtonText">Nome aleatório</span></button>
        <div class="options">
            <span>Incluir</span>
            <div class="boxFlex">
            <label class="box">
            <input id="k" type="checkbox" checked>k
            </label>
            <label class="box">
            <input id="y" type="checkbox" checked>y
            </label>
            <label class="box">
            <input id="w" type="checkbox" checked>w
            </label>
            <label class="box">
            <input id="h" type="checkbox" checked>h
            </label>
            <label class="box">
            <input id="x" type="checkbox" checked>x
            </label>
            <label class="box">
            <input id="z" type="checkbox" checked>z
            </label>
            </div>
        </div>
        <div class="options">
            <span>Abrasileirar</span>
        <div class="boxFlex">
            <label class="box">
            <input type="radio" name="abrasileirar" value="2">
            x0
            </label>
            <label class="box">
            <input type="radio" name="abrasileirar" value="1" checked>
            x1
            </label>
            <label class="box">
            <input type="radio" name="abrasileirar" value="0">
            x2
            </label>
        </div>
        </div>
        <div class="options">
            <span>Tamanho do nome</span>
                <div class="boxFlex">
                    <div>
                        <span>mín</span>
                        <span type="button" class="lengthControls" id="min-decrease">-</span>
                        
                        <input type="number" name="minLength" min="4" max="15" value="4">
                        
                        <span type="button" class="lengthControls" id="min-increase">+</span>
                    </div>
                    <div>
                        <span>máx</span>
                        <span type="button" class="lengthControls" id="max-decrease">-</span>
                        <label>
                        <input type="number" name="maxLength" min="5" max="16" value="10">
                        </label>
                        <span type="button" class="lengthControls" id="max-increase">+</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
